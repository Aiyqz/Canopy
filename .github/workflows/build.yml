name: Build

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    # macos-26 (Tahoe) ships Xcode 26, whose SDK has the Liquid Glass APIs
    # (glassEffect) the notch uses behind macOS-26 availability guards.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
          echo "--- Installed Xcodes ---"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          echo "--- SDKs ---"
          xcodebuild -showsdks 2>/dev/null | grep -i macos || true

      # Fast sanity build of the app via SwiftPM (the screen saver isn't an SPM
      # target, so it's covered by xcodebuild below).
      - name: swift build
        run: swift build -c release

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # The MediaRemote adapter binaries are vendored (gitignored, built locally by
      # Scripts/fetch-adapter.sh). CI only verifies compilation, so stub the paths
      # the Copy Resources phase expects — the committed mediaremote-adapter.pl is real.
      - name: Stub vendored adapter resources
        run: |
          mkdir -p Resources/MediaRemoteAdapter.framework
          touch Resources/MediaRemoteAdapterTestClient

      # Build both products. The MediaRemote adapter resources are optional (not
      # committed), and signing is skipped — we only verify the code compiles.
      - name: Build Canopy.app
        run: |
          xcodebuild -project Canopy.xcodeproj -scheme Canopy \
            -configuration Debug -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO build

      - name: Build CanopyScreenSaver.saver
        run: |
          xcodebuild -project Canopy.xcodeproj -scheme CanopyScreenSaver \
            -configuration Debug -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO build
